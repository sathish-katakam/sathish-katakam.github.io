<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sathish Kumar</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#020617,#0f172a);
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:110px;
  height:100vh;
  position:fixed;
  left:0;
  top:0;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);

  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:20px;
  gap:25px;
}

/* BUTTON */
.nav-item {
  width:80px;
  height:80px;
  border-radius:20px;

  background: rgba(255,255,255,0.05);

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  text-decoration:none;
  color:#60a5fa;
  font-size:11px;

  transition: all 0.3s ease;
}

/* ICON */
.nav-item svg {
  width:26px;
  height:26px;
  margin-bottom:6px;
  stroke: currentColor;
}

/* HOVER */
.nav-item:hover {
  transform: translateY(-5px) scale(1.05);
  background: rgba(255,255,255,0.1);
}

/* ACTIVE (GLOW EFFECT) */
.nav-item.active {
  background: linear-gradient(135deg,#2563eb,#3b82f6);
  color:white;

  box-shadow:
    0 0 20px rgba(59,130,246,0.6),
    0 0 40px rgba(59,130,246,0.3);
}

/* MAIN CONTENT */
.main {
  margin-left:110px;
  padding:60px;
  width:100%;
}

/* HERO */
.hero h1 {
  font-size:42px;
  background: linear-gradient(to right,#22c55e,#38bdf8);
  -webkit-background-clip: text;
  color: transparent;
}

.hero p {
  margin-top:10px;
  opacity:0.8;
}

/* METRICS */
.metrics {
  display:flex;
  gap:30px;
  margin-top:30px;
}

.metric {
  background: rgba(255,255,255,0.05);
  padding:20px;
  border-radius:12px;
}
</style>
</head>

<!-- SIDEBAR -->
<div class="sidebar">

  <a href="index.html" class="nav-item active">

  <!-- PORTFOLIO -->

<!-- MAIN -->
<div class="main">

  <section class="hero">
