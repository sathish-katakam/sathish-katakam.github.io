<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sathish Kumar | DevOps</title>

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', sans-serif;
}

/* 🔥 FIX: FULL PAGE BACKGROUND */
html, body {
  height:100%;
  background: linear-gradient(135deg,#020617,#0f172a);
}

/* BODY */
body {
  display:flex;
  color:white;
}

/* SIDEBAR */
.sidebar {
  width:110px;
  height:100vh;
  position:fixed;
  left:0;
  top:0;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:20px;
  gap:25px;
}

.nav-item {
  width:80px;
  height:80px;
  border-radius:20px;
  background: rgba(255,255,255,0.05);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:#60a5fa;
  font-size:11px;
  cursor:pointer;
  transition:0.3s;
}

.nav-item:hover {
  transform:scale(1.05);
}

.nav-item.active {
  background: linear-gradient(135deg,#2563eb,#3b82f6);
  color:white;
  box-shadow:0 0 25px rgba(59,130,246,0.6);
}

/* TOP CARD */
.top-card {
  position:fixed;
  left:140px;
  top:20px;
  right:40px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-radius:20px;
  padding:20px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:10;
}

.profile-left {
  display:flex;
  align-items:center;
  gap:20px;
}

.avatar {
  width:70px;
  height:70px;
  border-radius:50%;
  background:url('https://i.pravatar.cc/150') center/cover;
}

.profile-info p {
  opacity:0.7;
}

.profile-right {
  display:flex;
  gap:40px;
}

.info-block span {
  display:block;
  font-size:12px;
  opacity:0.6;
}

/* MAIN */
.main {
  margin-left:110px;
  width:100%;
  display:flex;
  justify-content:center;
  padding-top:140px;
  min-height:100vh; /* 🔥 FIX */
}

.content {
  width:900px;
}

/* SECTIONS */
.section {
  display:none;
}

.section.active {
  display:block;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  padding:30px;
  border-radius:20px;
  margin-bottom:20px;
}

/* HERO */
.hero h1 {
  font-size:40px;
  color:#22c55e;
}

.metrics {
  display:flex;
  gap:20px;
  margin-top:30px;
}

.metric {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="nav-item active" onclick="showSection('about', this)">ABOUT</div>
  <div class="nav-item" onclick="showSection('resume', this)">RESUME</div>
  <div class="nav-item" onclick="showSection('portfolio', this)">PORTFOLIO</div>
  <div class="nav-item" onclick="showSection('blog', this)">BLOG</div>
  <div class="nav-item" onclick="showSection('contact', this)">CONTACT</div>
</div>

<!-- TOP CARD -->
<div class="top-card">
  <div class="profile-left">
    <div class="avatar"></div>
    <div>
      <h2>Sathish Kumar</h2>
      <p>DevOps | Azure | AKS | CI/CD</p>
    </div>
  </div>

  <div class="profile-right">
    <div class="info-block">
      <span>EMAIL</span>
      your@email.com
    </div>

    <div class="info-block">
      <span>CV</span>
      <a href="#" style="color:#60a5fa;">Download</a>
    </div>

    <div class="info-block">
      <span>LOCATION</span>
      Hyderabad, IN
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="content">

    <div id="about" class="section active">
      <div class="card hero">
        <h1>Sathish Kumar</h1>
        <p>DevOps Engineer | Azure | AKS | CI/CD</p>

        <div class="metrics">
          <div class="metric">
            <h2>494+</h2>
            <p>Tenants</p>
          </div>

          <div class="metric">
            <h2>35</h2>
            <p>LOBs</p>
          </div>

          <div class="metric">
            <h2>CI/CD</h2>
            <p>Automation</p>
          </div>
        </div>
      </div>
    </div>

    <div id="portfolio" class="section">
      <div class="card">
        <h2>AKS Platform</h2>
        <p>Multi-tenant system with 494 tenants</p>
      </div>
    </div>

  </div>
</div>

<script>
function showSection(id, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}
</script>

</body>
</html>
