<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f172a;
  color:white;
}

.container {
  max-width:900px;
  margin:auto;
  padding:40px;
}

.card {
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;

  opacity:0;
  transform:translateY(30px);
  animation:fadeUp 0.8s ease forwards;
}

.card:nth-child(1){ animation-delay:0.2s; }
.card:nth-child(2){ animation-delay:0.4s; }
.card:nth-child(3){ animation-delay:0.6s; }

@keyframes fadeUp {
  to {
    opacity:1;
    transform:translateY(0);
  }
}
</style>
</head>

<body>

<div class="container">

  <h1>Projects</h1>

  <div class="card">
    <h3>AKS Multi-Tenant Platform</h3>
    <p><b>Problem:</b> Scaling infrastructure</p>
    <p><b>Solution:</b> AKS with namespace isolation</p>
    <p><b>Impact:</b> 494 tenants</p>
  </div>

  <div class="card">
    <h3>CI/CD Pipelines</h3>
    <p>Automated deployments</p>
  </div>

  <div class="card">
    <h3>Landing Zone</h3>
    <p>Terraform-based infra</p>
  </div>

</div>

</body>
</html>
